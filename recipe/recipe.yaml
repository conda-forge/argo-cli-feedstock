context:
  version: "4.0.2"

package:
  name: argo-cli
  version: ${{ version }}

source:
  - url: https://github.com/argoproj/argo-workflows/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 7a011b04e757152f30fd7ae14a298b941b680d6caa44f047f18cd4ac674eebe2
  - url: https://raw.githubusercontent.com/jmespath/go-jmespath/b89213a/LICENSE
    sha256: cfc7749b96f63bd31c3c42b5c471bf756814053e847c10f3eb003417bc523d30
    file_name: LICENSE-jmespath

build:
  number: 0
  skip:
    - win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('go-cgo') }}
    - yarn <2
    - go-licenses

tests:
  - script:
      - argo --help
      - 'argo version | grep "argo: v${{ version }}"'

about:
  homepage: https://github.com/argoproj/argo-workflows
  summary: Workflow Engine for Kubernetes
  license: Apache-2.0
  license_file:
    - LICENSE
    - LICENSE-jmespath
    - library_licenses/
  documentation: https://argo-workflows.readthedocs.io/
  repository: https://github.com/argoproj/argo-workflows

extra:
  recipe-maintainers:
    - borchero
